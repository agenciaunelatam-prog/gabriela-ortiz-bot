name: Gabriela Ortiz - Facebook a WordPress

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Restaurar IDs procesados
        uses: actions/cache@v4
        with:
          path: processed_ids.txt
          key: processed-ids-${{ github.run_id }}
          restore-keys: processed-ids-

      - name: Correr bot
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: python bot.py

      - name: Guardar IDs procesados
        uses: actions/cache@v4
        with:
          path: processed_ids.txt
          key: processed-ids-${{ github.run_id }}
